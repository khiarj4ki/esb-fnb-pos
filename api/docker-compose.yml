version: '2'
services:
  app:
    container_name: esb-fnb
    image: yiisoftware/yii2-php:7.1-apache
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - '8000:80'
  mysql:
    container_name: esb-db
    image: mysql:5.7
    ports:
        - 3307:3306
    environment:
        TZ: 'Asia/Jakarta'
        MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
        MYSQL_ROOT_PASSWORD: 'root'
        MYSQL_USER: 'userptkd'
        MYSQL_PASSWORD: 'ptkd'