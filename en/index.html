<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title></title>
  <script>
    (function() {
      var baseUrl = '/';
      const allowedPortBuild = ['80', '85', '443', ''];
      if(allowedPortBuild.includes(window.location.port)){
        const path = window.location.pathname.split('/');
        const fixPath = [];
        for(var i=0; i <= path.length; i++){
          if(path[i] !== '' ){
            fixPath.push(path[i]);
            if(path[i] == 'en' || path[i] == 'id') {
              break;
            } 
          }
        }
        baseUrl = '/' + fixPath.join('/') + '/';
      }
      
      var base = document.createElement('base');
      base.href = baseUrl;
      document.getElementsByTagName('head')[0].appendChild(base);
    })();
  </script>
  <meta name="viewport"
    content="width=device-width, initial-scale=1">
  <link rel="icon"
    type="image/x-icon"
    href="">
  <style>
    /* Grab from https://loading.io/css/ */
    .lds-ellipsis {
      display: inline-block;
      position: relative;
      width: 62px;
      height: 11px;
    }

    .lds-ellipsis div {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background-color: #F5833B;
      animation-timing-function: cubic-bezier(0, 1, 1, 0);
    }

    .lds-ellipsis div:nth-child(1) {
      left: 6px;
      animation: lds-ellipsis1 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(2) {
      left: 6px;
      animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(3) {
      left: 26px;
      animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(4) {
      left: 45px;
      animation: lds-ellipsis3 0.6s infinite;
    }

    @keyframes lds-ellipsis1 {
      0% {
        transform: scale(0);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes lds-ellipsis3 {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(0);
      }
    }

    @keyframes lds-ellipsis2 {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(19px, 0);
      }
    }

    .loading-page-wrapper {
      width: 100%;
      height: 100%;
      background-color: #FFFFFF;
    }

    .loading-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      min-height: 170px;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .loading-content-wrapper {
      display: block;
      margin-top: 20px;
    }

    .loading-text {
      display: block;
      min-height: 24px;
      font-family: "Segoe UI";
      font-size: 16px;
    }
  </style>
  <script>
    if (localStorage.showKeyboard == 0) {
      var styles = ".mat-keyboard-wrapper { display: none !important;}";
      var styleSheet = document.createElement("style");
      styleSheet.type = "text/css";
      styleSheet.innerText = styles;
      document.head.appendChild(styleSheet);
    }
  </script>

<body>
  <app-root id="root"></app-root>
  <script>
    let showESBLogo = localStorage.getItem('showESBLogo');

    let img = "";
    if (!showESBLogo || showESBLogo == "\"1\"") {
      img = `<img src="assets/images/login-logo.png" alt="ESB FNB" style="width: 150px;" />`;

      document.title = "ESB POS";
      let link = document.querySelector("link[rel*='icon']");
      link.href = "favicon.ico";
    } else {
      document.title = "POS";
      let link = document.querySelector("link[rel*='icon']");
      link.href = "assets/images/icons/favicon.ico";
    }

    let root = document.getElementById('root');
    root.insertAdjacentHTML('beforeend',
      `<div class="loading-page-wrapper">
        <div class="loading-wrapper">
          `+img+`
          <div class="loading-content-wrapper">
            <div class="lds-ellipsis">
              <div></div>
              <div></div>
              <div></div>
              <div></div>
            </div>
          </div>
        </div>
      </div>`
    );
  </script>
